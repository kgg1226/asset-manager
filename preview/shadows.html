<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-app);padding:24px;font-family:var(--font-sans);}
.row{display:flex;gap:28px;}
.item{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.box{width:100%;max-width:180px;height:60px;background:#fff;border:1px solid var(--border-default);border-radius:8px;}
.name{font-size:11px;font-weight:600;}
.val{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center;}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">shadow-sm</div><div class="val">cards · inputs · mobile btn</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow)"></div><div class="name">shadow</div><div class="val">rarely; occasional popover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="name">shadow-xl</div><div class="val">modals · widget panel</div></div>
</div>
</body></html>
