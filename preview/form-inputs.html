<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#fff;padding:22px;font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;max-width:620px;}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;}
.input{display:block;width:100%;border-radius:6px;border:1px solid #d1d5db;background:#fff;padding:8px 12px;font-size:14px;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,.05);outline:none;box-sizing:border-box;font-family:inherit;}
.input:focus{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f6;}
.input.focus{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f6;}
.input.error{border-color:#dc2626;box-shadow:0 0 0 1px #dc2626;}
.hint{font-size:11.5px;color:#6b7280;margin-top:4px;}
.err{font-size:11.5px;color:#b91c1c;margin-top:4px;}
.search{position:relative;}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#9ca3af;}
.search .input{padding-left:32px;}
</style></head><body>
<div class="grid">
  <div><label>Username</label><input class="input" value="admin"></div>
  <div><label>Password</label><input class="input focus" type="password" value="•••••••"><div class="hint">Focused state</div></div>
  <div><label>Asset name</label><input class="input" placeholder="e.g. Figma Professional"></div>
  <div><label>Expiry date</label><input class="input error" value="not a date"><div class="err">Invalid date format</div></div>
  <div class="search"><label>Search</label>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="input" placeholder="Search licenses, assets, employees…" style="padding-left:32px;">
  </div>
  <div><label>Status</label>
    <select class="input"><option>All</option><option>Active</option><option>Expiring</option></select>
  </div>
</div>
</body></html>
