<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preview shell</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .preview-root {
    box-sizing: border-box;
    width: 100%;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .preview-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .preview-grid { display: grid; gap: 10px; }
</style>
</head>
<body>
<div class="preview-root"></div>
</body>
</html>
