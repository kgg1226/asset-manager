<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--bg-app);padding:18px;font-family:var(--font-sans);}
.diagram{position:relative;width:100%;height:170px;border:1px solid var(--border-default);background:#fff;border-radius:8px;overflow:hidden;}
.sb{position:absolute;inset:0 auto 0 0;width:120px;background:#fff;border-right:1px solid var(--border-default);}
.hdr{position:absolute;top:0;left:120px;right:0;height:28px;background:#fff;border-bottom:1px solid var(--border-default);}
.main{position:absolute;top:28px;left:120px;right:0;bottom:0;background:var(--bg-app);}
.tag{position:absolute;font-family:var(--font-mono);font-size:10px;padding:2px 6px;background:var(--blue-600);color:#fff;border-radius:4px;}
</style></head><body>
<div class="diagram">
  <div class="sb"></div>
  <div class="hdr"></div>
  <div class="main"></div>
  <span class="tag" style="top:8px;left:40px">w-60 · 240px sidebar</span>
  <span class="tag" style="top:6px;left:260px">h-14 · 56px header</span>
  <span class="tag" style="top:100px;left:260px;background:#6b7280">max-w-7xl · px-4 content</span>
</div>
</body></html>
