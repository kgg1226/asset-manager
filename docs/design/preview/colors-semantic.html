<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#fff;padding:18px;font-family:var(--font-sans);font-size:12px;}
table{width:100%;border-collapse:collapse;}
th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border-default);}
th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-muted);background:var(--gray-50);}
.sw{display:inline-block;width:18px;height:18px;border-radius:4px;border:1px solid rgba(0,0,0,.08);vertical-align:middle;margin-right:8px;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);}
</style></head><body>
<table>
<thead><tr><th>Token</th><th>Role</th><th>Value</th></tr></thead>
<tbody>
<tr><td><span class="sw" style="background:#f9fafb"></span><span class="tok">--bg-app</span></td><td>App background</td><td class="tok">gray-50</td></tr>
<tr><td><span class="sw" style="background:#ffffff"></span><span class="tok">--bg-surface</span></td><td>Cards, sidebar, header</td><td class="tok">#ffffff</td></tr>
<tr><td><span class="sw" style="background:#111827"></span><span class="tok">--fg-primary</span></td><td>Body + headings</td><td class="tok">gray-900</td></tr>
<tr><td><span class="sw" style="background:#6b7280"></span><span class="tok">--fg-muted</span></td><td>Captions · counts</td><td class="tok">gray-500</td></tr>
<tr><td><span class="sw" style="background:#e5e7eb"></span><span class="tok">--border-default</span></td><td>Dividers · card borders</td><td class="tok">gray-200</td></tr>
<tr><td><span class="sw" style="background:#2563eb"></span><span class="tok">--accent-primary</span></td><td>CTAs · active · links</td><td class="tok">blue-600</td></tr>
</tbody>
</table>
</body></html>
