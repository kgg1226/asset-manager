<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#fff;padding:20px;font-family:var(--font-sans);font-size:12px;}
.row{display:flex;align-items:center;gap:12px;padding:4px 0;}
.label{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);}
.bar{height:14px;background:var(--blue-600);border-radius:2px;}
.px{color:var(--fg-muted);font-family:var(--font-mono);font-size:10.5px;}
</style></head><body>
<div class="row"><span class="label">0.5</span><span class="bar" style="width:2px"></span><span class="px">2px · space-y-0.5 (sidebar)</span></div>
<div class="row"><span class="label">1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
<div class="row"><span class="label">2</span><span class="bar" style="width:8px"></span><span class="px">8px · gap</span></div>
<div class="row"><span class="label">3</span><span class="bar" style="width:12px"></span><span class="px">12px · px-3 nav item</span></div>
<div class="row"><span class="label">4</span><span class="bar" style="width:16px"></span><span class="px">16px · px-4 table cell / mb-4</span></div>
<div class="row"><span class="label">6</span><span class="bar" style="width:24px"></span><span class="px">24px · p-6 card body</span></div>
<div class="row"><span class="label">10</span><span class="bar" style="width:40px"></span><span class="px">40px · py-10 page top</span></div>
</body></html>
