<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#fff;padding:20px;font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.card{border:1px solid var(--border-default);border-radius:8px;overflow:hidden;}
.swatch{height:36px;}
.meta{padding:8px 10px;}
.name{font-size:12px;font-weight:600;}
.use{font-size:11px;color:var(--fg-muted);margin-top:2px;}
.badge{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;}
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="swatch" style="background:#dcfce7"></div>
    <div class="meta"><div class="name">Green — Low</div><div class="use">CIA 1 · Healthy</div>
    <span class="badge" style="background:#dcfce7;color:#166534">낮음 · Low</span></div>
  </div>
  <div class="card">
    <div class="swatch" style="background:#fef9c3"></div>
    <div class="meta"><div class="name">Yellow — Medium</div><div class="use">CIA 2 · Expiring</div>
    <span class="badge" style="background:#fef9c3;color:#854d0e">보통 · Medium</span></div>
  </div>
  <div class="card">
    <div class="swatch" style="background:#fee2e2"></div>
    <div class="meta"><div class="name">Red — High</div><div class="use">CIA 3 · Expired</div>
    <span class="badge" style="background:#fee2e2;color:#991b1b">높음 · High</span></div>
  </div>
  <div class="card">
    <div class="swatch" style="background:#f3e8ff"></div>
    <div class="meta"><div class="name">Purple — Alpha</div><div class="use">Beta feature tag</div>
    <span class="badge" style="background:#f3e8ff;color:#7e22ce">Alpha</span></div>
  </div>
</div>
</body></html>
