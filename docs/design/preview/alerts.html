<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#f9fafb;padding:22px;font-family:var(--font-sans);}
.stack{display:flex;flex-direction:column;gap:10px;max-width:580px;}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;display:flex;gap:8px;align-items:flex-start;}
.alert svg{width:14px;height:14px;flex-shrink:0;margin-top:2px;stroke-width:2;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;}
.err{background:#fef2f2;color:#b91c1c;}
.warn{background:#fef9c3;color:#854d0e;}
.ok{background:#f0fdf4;color:#166534;}
.info{background:#eff6ff;color:#1d4ed8;}
.toast{background:#111827;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;box-shadow:0 20px 25px -5px rgba(0,0,0,.2);display:inline-flex;align-items:center;gap:8px;}
</style></head><body>
<div class="stack">
  <div class="alert err"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>로그인에 실패했습니다. · Invalid credentials.</div>
  <div class="alert warn"><svg viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>This license expires in 7 days.</div>
  <div class="alert ok"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Saved · 저장되었습니다.</div>
  <div class="alert info"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>2 assignments will be reclaimed on offboarding.</div>
  <div style="margin-top:6px">
  <span class="toast"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>CSV imported · 124 rows</span>
  </div>
</div>
</body></html>
