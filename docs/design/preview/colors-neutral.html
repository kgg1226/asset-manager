<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#fff;padding:20px;font-family:var(--font-sans);}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border-default);}
.sw{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:4px;min-width:0;}
.sw .name{font-size:11px;font-weight:600;}
.sw .hex{font-family:var(--font-mono);font-size:10.5px;opacity:.75;}
.dark{color:#fff;}.light{color:#111827;}
.caption{color:var(--fg-muted);font-size:12px;margin-top:10px;}
</style></head><body>
<div class="row">
  <div class="sw light" style="background:#f9fafb"><span class="name">50</span><span class="hex">#f9fafb</span></div>
  <div class="sw light" style="background:#f3f4f6"><span class="name">100</span><span class="hex">#f3f4f6</span></div>
  <div class="sw light" style="background:#e5e7eb"><span class="name">200</span><span class="hex">#e5e7eb</span></div>
  <div class="sw light" style="background:#d1d5db"><span class="name">300</span><span class="hex">#d1d5db</span></div>
  <div class="sw light" style="background:#9ca3af"><span class="name">400</span><span class="hex">#9ca3af</span></div>
  <div class="sw dark"  style="background:#6b7280"><span class="name">500</span><span class="hex">#6b7280</span></div>
  <div class="sw dark"  style="background:#4b5563"><span class="name">600</span><span class="hex">#4b5563</span></div>
  <div class="sw dark"  style="background:#374151"><span class="name">700</span><span class="hex">#374151</span></div>
  <div class="sw dark"  style="background:#1f2937"><span class="name">800</span><span class="hex">#1f2937</span></div>
  <div class="sw dark"  style="background:#111827"><span class="name">900</span><span class="hex">#111827</span></div>
</div>
<div class="caption">Gray — app background, surfaces, borders, text. 90%+ of pixels.</div>
</body></html>
